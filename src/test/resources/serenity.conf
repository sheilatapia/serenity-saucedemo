serenity {
  project.name = "SauceDemo - Compra Exitosa"
  take.screenshots = FOR_FAILURES
}

webdriver {
  driver = chrome
  autodownload = true
  timeouts {
    implicit.wait = 10
    click.timeout = 10
    pageload.timeout = 30
  }
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["--start-maximized", "--disable-notifications", "--no-sandbox", "--disable-dev-shm-usage"]
    }
  }
}

environments {
  default {
    webdriver.base.url = "https://www.saucedemo.com"
  }
}